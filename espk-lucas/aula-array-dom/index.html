<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Lista de Alunos</h1>
        <section>
            <h2>Cadastrar aluno</h2>

            <input type="text" id="nome" placeholder="Nome do Aluno">
            <input type="number" id="idade" placeholder="Idade">
            <input type="text" id="curso" placeholder="Curso">

            <button id="btnAdicionarFinal">Adicionar no final</button>
            <button id="btnAdicionarInicio">Adicionar no inicio</button>
        </section>
        <section class="card">
            <h2>Ações</h2>
            <button id="btnRemoverPrimeiro">Remove Primeiro</button>
            <button id="btnRemoverUltimo">Remove Ultimo</button>
            <button id="btnRemoverUltimo">Mostrar 2 primeiros</button>
        </section>
        <section class="card">
            <h2>Buscar ou remover aluno</h2>
            <input type="text" id="busca" placeholder="Digite o nome">
            <button id="btnBuscar">Buscar Aluno</button>
        </section>
        <section class="card">
            <h2>Resultado</h2>
            <p> Total de Alunos: <span id="total">0</span></p>
            <ul id="listaAlunos"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
